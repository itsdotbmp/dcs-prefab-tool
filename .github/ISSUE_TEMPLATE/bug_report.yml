name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The more concrete the repro, the faster the fix — a 5-line snippet beats a paragraph of description.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of dcs-sms is affected?
      options:
        - Framework (sms.* in mission scripts)
        - ME-mod (Mission Editor extension / Prefab Manager)
        - CLI (dcs-sms.exe — bridge, installer, gen-units)
        - Not sure
    validations:
      required: true

  - type: input
    id: dcs-sms-version
    attributes:
      label: dcs-sms version
      description: |
        - Framework: print `sms.version` from inside DCS.
        - ME-mod: shown in the Prefab Manager title bar (e.g. `v0.1.0`).
        - CLI: `dcs-sms.exe --version`.
      placeholder: e.g. me-mod v0.1.0
    validations:
      required: true

  - type: input
    id: dcs-version
    attributes:
      label: DCS World version
      description: From DCS's main menu (lower-right corner).
      placeholder: e.g. 2.9.10.4360 OB
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Plain English. What did you do, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: As specific as you can. A minimal Lua snippet or a click-by-click walk-through is ideal.
      render: shell
    validations:
      required: false

  - type: textarea
    id: dcs-log
    attributes:
      label: Relevant dcs.log lines
      description: |
        Open `<Saved Games>\DCS\Logs\dcs.log` and paste any `[sms.*]` lines from around the time of the bug. ERROR-level lines are especially helpful.
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Screenshots, theories, "this used to work in v0.1.0", etc.
    validations:
      required: false
