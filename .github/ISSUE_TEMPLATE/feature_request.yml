name: Feature request
description: Suggest a new sms.* function, ME-mod feature, or CLI subcommand.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The framework grows by spotting where it falls short. Concrete, scoped requests get traction faster than open-ended wishlists — a sketch of how mission code would call your idea is worth ten paragraphs of description.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Framework (sms.* in mission scripts)
        - ME-mod (Mission Editor extension / Prefab Manager)
        - CLI (dcs-sms.exe — bridge, installer, gen-units)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do, and why? A real-world mission example beats an abstract description.
    validations:
      required: true

  - type: textarea
    id: shape
    attributes:
      label: Proposed shape
      description: |
        Sketch the API or UI. For framework features, a few lines of mission code that would call it. For ME-mod features, a sentence or two on where it lives in the UI.
        Don't worry about getting it right — the point is to give us something concrete to push on.
      render: lua
    validations:
      required: false

  - type: textarea
    id: vanilla
    attributes:
      label: How are you doing it today?
      description: |
        If you're working around the gap with vanilla DCS API, MOOSE, or your own helper code, paste a snippet. Helps us see exactly where the seam is.
      render: lua
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you considered and rejected, or why a similar thing in MOOSE / the vanilla API doesn't work for your case.
    validations:
      required: false
