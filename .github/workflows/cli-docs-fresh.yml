name: CLI docs fresh

# Catches drift between the dcs-sms CLI surface and the autogenerated
# reference under `docs/cli/`. Runs `dcs-sms doc -out docs/cli` and fails
# if `git diff` shows any changes — i.e. the committed docs no longer
# match what the binary would produce.
#
# Triggered on PRs and direct pushes to main, but only when files that
# could plausibly affect the docs are touched (the CLI sources, the
# generator itself, or `docs/cli/` directly).

on:
  pull_request:
    paths:
      - 'tools/cmd/dcs-sms/**'
      - 'tools/go.mod'
      - 'tools/go.sum'
      - 'docs/cli/**'
      - '.github/workflows/cli-docs-fresh.yml'
  push:
    branches:
      - main
    paths:
      - 'tools/cmd/dcs-sms/**'
      - 'tools/go.mod'
      - 'tools/go.sum'
      - 'docs/cli/**'
      - '.github/workflows/cli-docs-fresh.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Regenerate docs/cli/
        working-directory: tools
        run: go run ./cmd/dcs-sms doc -out ../docs/cli

      - name: Fail if docs/cli/ is stale
        run: |
          if ! git diff --quiet --exit-code docs/cli/; then
            echo '::error::docs/cli/ is stale.'
            echo 'Regenerate locally and commit:'
            echo '  cd tools && go run ./cmd/dcs-sms doc -out ../docs/cli && cd .. && git add docs/cli/'
            echo ''
            echo '--- diff ---'
            git --no-pager diff docs/cli/
            exit 1
          fi
          echo 'docs/cli/ is in sync.'
