name: Release ME-mod

on:
  push:
    tags:
      - 'me-mod-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing me-mod-v* tag to (re)release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0  # need history so the tag's annotation message is reachable

      - name: Derive version
        id: ver
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          echo "version=${tag#me-mod-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Cross-compile dcs-sms.exe (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        working-directory: tools
        run: go build -trimpath -ldflags="-s -w" -o ../dcs-sms.exe ./cmd/dcs-sms

      - name: Compose release notes
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          {
            git tag -l --format='%(contents)' "$tag"
            cat <<'EOF'

          ---

          ## Install

          1. Download **dcs-sms.exe** from this release.
          2. Run `dcs-sms.exe install-me-mod`. The .exe auto-detects your DCS install (or prompts the first time), copies the embedded ME-mod Lua files into `<DCS install>/MissionEditor/modules/dcs_sms_me/`, and patches `MissionEditor.lua` with a single bootstrap line bracketed by sentinel comments for clean removal.
          3. Restart DCS (a full restart, not just closing the Mission Editor — the lua files load once at DCS start). When you open the Mission Editor you should see **DCS-SMS** in the top menu bar.

          ## Update

          Download the new `dcs-sms.exe` and re-run `install-me-mod`. Idempotent — the patch line is left in place, the Lua files get overwritten with the new version.

          ## Uninstall

          ```
          dcs-sms.exe uninstall-me-mod
          ```

          Removes the patch block from `MissionEditor.lua` and deletes the modules directory.
          EOF
          } > release-notes.md
          echo '--- preview ---'
          cat release-notes.md

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          title="ME-mod v${{ steps.ver.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists; updating notes + asset."
            gh release edit   "$tag" --title "$title" --notes-file release-notes.md
            gh release upload "$tag" dcs-sms.exe --clobber
          else
            echo "Creating new release for $tag."
            gh release create "$tag" --title "$title" --notes-file release-notes.md dcs-sms.exe
          fi
