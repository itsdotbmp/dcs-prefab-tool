name: Release ME-mod

on:
  push:
    tags:
      - 'me-mod-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing me-mod-v* tag to (re)release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.ref }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0  # need history so the tag's annotation message is reachable

      - name: Derive version
        id: ver
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          echo "version=${tag#me-mod-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Cross-compile dcs-sms.exe (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        working-directory: tools
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" -o ../dcs-sms.exe ./cmd/dcs-sms

      - name: Stage OVGME mod tree
        # Builds an OVGME-shaped zip alongside the .exe so users whose
        # browsers block unsigned binaries (Edge SmartScreen / Defender)
        # have a no-binary install path. We deliberately do NOT ship a
        # patched MissionEditor.lua — DCS EULA §3.1(a) prohibits
        # redistributing modified ED files. The README in the zip walks
        # the user through a one-line manual edit they apply to their
        # own copy on their own machine, which is permitted.
        run: |
          version="${{ steps.ver.outputs.version }}"
          stage="ovgme-stage"
          mod="dcs-sms-me-mod"
          dst="$stage/$mod/MissionEditor/modules/dcs_sms_me"
          mkdir -p "$dst"
          cp -r tools/me-mod/lua/dcs_sms_me/. "$dst/"
          cat > "$stage/README.md" <<'README_EOF'
          # dcs-sms ME-mod — OVGME install

          This OVGME-friendly zip exists for users who can't run `dcs-sms.exe install-me-mod` (typically because Edge SmartScreen / Windows Defender blocks the unsigned binary). The runtime mod is identical to what the .exe installs — you're just doing the file-copy step via OVGME and the `MissionEditor.lua` patch step by hand.

          ## Install

          1. Drop the `dcs-sms-me-mod` folder into your OVGME mods directory (or in OVGME: **Add Mod → Folder → dcs-sms-me-mod**).
          2. Enable **dcs-sms-me-mod** in OVGME. This copies our Lua module files into `<DCS install>/MissionEditor/modules/dcs_sms_me/`.
          3. **Manually patch `MissionEditor.lua`.** Open `<DCS install>/MissionEditor/MissionEditor.lua` in a text editor (Notepad is fine — run as Administrator if your DCS is in Program Files). Append this single line at the very end of the file:

             ```lua
             require('dcs_sms_me.init')
             ```

             Save the file.
          4. Fully quit DCS and start it again (a full restart, not just closing the Mission Editor — Lua modules load once at DCS start). On next open of the Mission Editor you should see **DCS-SMS** in the top menu bar.

          ## Update

          Replace the OVGME mod folder with the new release's contents and re-enable the mod. The `MissionEditor.lua` patch line stays where you put it — no re-edit needed unless DCS itself replaced your `MissionEditor.lua` (which happens on some DCS updates; if the mod stops appearing after a DCS update, re-apply step 3).

          ## Uninstall

          Disable the mod in OVGME (this removes the Lua files). Delete the `require('dcs_sms_me.init')` line from `MissionEditor.lua` if you want a fully clean uninstall.

          ## Why the manual edit?

          OVGME can copy files but can't surgically edit them. The mod needs one line added to `MissionEditor.lua` so the ME actually loads it at startup. The `dcs-sms.exe install-me-mod` path does this automatically; the OVGME path requires you to do it once by hand.

          We considered shipping a pre-patched `MissionEditor.lua` in this zip, but that would mean redistributing a modified copy of an ED-owned file, which the DCS EULA §3.1(a) prohibits without express written consent. Editing your own copy on your own machine is fine; us shipping a modified copy is not. Hence the one-line manual step.

          ## Prefer the .exe install if you can

          If your browser blocked `dcs-sms.exe` as "unsigned", you can usually right-click the downloaded file → **Properties** → tick **Unblock** at the bottom → **OK**, and Windows will let you run it. Or in Edge's download warning, click **…** → **Keep** → **Show more** → **Keep anyway**. The .exe handles both file-copy and `MissionEditor.lua` patching in one shot, and supports `dcs-sms.exe update` / `dcs-sms.exe uninstall-me-mod`.
          README_EOF
          (cd "$stage" && zip -r "../dcs-sms-me-mod-v${version}.zip" .)
          ls -la "dcs-sms-me-mod-v${version}.zip"

      - name: Compose release notes
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          {
            git tag -l --format='%(contents)' "$tag"
            cat <<'EOF'

          ---

          ## Install

          1. Download **dcs-sms.exe** from this release.
          2. **Double-click `dcs-sms.exe`.** A small menu opens — pick **1** to install. (Prefer the command line? Run `dcs-sms.exe install-me-mod` from a terminal in the same folder — same result.)

             <p align="center"><img src="https://raw.githubusercontent.com/nielsvaes/dcs-sms/${{ steps.tag.outputs.ref }}/assets/dcs-sms-doubleclick.png" alt="dcs-sms.exe interactive menu — DCS install path line plus four numbered options" width="780"></p>

             Either way, the .exe auto-detects your DCS install (or you can paste the path via menu option 4), copies the embedded ME-mod Lua files into `<DCS install>/MissionEditor/modules/dcs_sms_me/`, and patches `MissionEditor.lua` with a single bootstrap line bracketed by sentinel comments for clean removal.
          3. Restart DCS (a full restart, not just closing the Mission Editor — the lua files load once at DCS start). When you open the Mission Editor you should see **DCS-SMS** in the top menu bar.

          ## Update

          From an existing install, run:

          ```
          dcs-sms.exe update
          dcs-sms.exe install-me-mod
          ```

          The first command pulls the new `dcs-sms.exe` from this release in place; the second re-applies the bundled ME-mod files. Idempotent — the patch line in `MissionEditor.lua` stays put, the Lua files get overwritten. After updating, fully quit DCS and start it again.

          (`dcs-sms.exe update` requires you already have a `dcs-sms.exe` from a previous install. First-time users follow the **Install** steps above instead.)

          ## Uninstall

          ```
          dcs-sms.exe uninstall-me-mod
          ```

          Removes the patch block from `MissionEditor.lua` and deletes the modules directory.

          ## Alternative install (OVGME / no .exe)

          If your browser blocks **dcs-sms.exe** as "unsigned" and you can't unblock it, an OVGME-friendly zip is also attached to this release: **dcs-sms-me-mod-vX.Y.Z.zip**.

          1. Download the zip and extract it.
          2. Drop the `dcs-sms-me-mod` folder into your OVGME mods directory; enable it in OVGME.
          3. Open `<DCS install>/MissionEditor/MissionEditor.lua` in a text editor and append this single line at the end of the file: `require('dcs_sms_me.init')` — then save.
          4. Restart DCS.

          Full instructions are in the `README.md` inside the zip. The .exe path is still recommended where possible — it patches `MissionEditor.lua` for you and supports `dcs-sms.exe update` / `dcs-sms.exe uninstall-me-mod`.
          EOF
          } > release-notes.md
          echo '--- preview ---'
          cat release-notes.md

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          title="ME-mod v${{ steps.ver.outputs.version }}"
          zip="dcs-sms-me-mod-v${{ steps.ver.outputs.version }}.zip"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists; updating notes + assets."
            gh release edit   "$tag" --title "$title" --notes-file release-notes.md
            gh release upload "$tag" dcs-sms.exe "$zip" --clobber
          else
            echo "Creating new release for $tag."
            gh release create "$tag" --title "$title" --notes-file release-notes.md dcs-sms.exe "$zip"
          fi

  notify-discord:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Post release embed to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          desc=$(git tag -l --format='%(contents)' "$TAG" | head -c 1500)
          url="https://github.com/${REPO}/releases/tag/${TAG}"
          payload=$(jq -n \
            --arg title "ME-mod v${VERSION}" \
            --arg url "$url" \
            --arg desc "$desc" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5763719
              }]
            }')
          curl -fsSL -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
